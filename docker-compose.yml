services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - HORMUZ_ANTHROPIC_API_KEY=${HORMUZ_ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - api
